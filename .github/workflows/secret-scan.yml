name: Secret Scan

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  scan:
    name: high-confidence-secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request head
        if: github.event_name == 'pull_request'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout repository
        if: github.event_name != 'pull_request'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Select trusted scanner
        id: scanner
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          SCANNER_PATH: scripts/security/scan-secrets.py
        run: |
          set -euo pipefail

          if [ -n "${BASE_SHA}" ]; then
            git fetch --no-tags --depth=1 origin "${BASE_SHA}"
            if git cat-file -e "${BASE_SHA}:${SCANNER_PATH}" 2>/dev/null; then
              git show "${BASE_SHA}:${SCANNER_PATH}" > "${RUNNER_TEMP}/scan-secrets.py"
              chmod +x "${RUNNER_TEMP}/scan-secrets.py"
              echo "path=${RUNNER_TEMP}/scan-secrets.py" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            echo "::warning::Base branch scanner not found; using bootstrap scanner from this PR."
          fi

          echo "path=${GITHUB_WORKSPACE}/${SCANNER_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Scan tracked files
        if: github.event_name != 'pull_request'
        run: python3 "${{ steps.scanner.outputs.path }}" --repo "${GITHUB_WORKSPACE}"

      - name: Scan tracked files and pull request commit range
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 "${{ steps.scanner.outputs.path }}" --repo "${GITHUB_WORKSPACE}" --commit-range "${BASE_SHA}..${HEAD_SHA}"
